<!DOCTYPE html>
<html>
<head>
    <title>Driver Control Panel - Vignan Tracker</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #0b0f19; color: white; }
        .header-bar { background: #002244; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #003366; }
        .form-wrapper { max-width: 420px; background: #111827; margin: 40px auto; padding: 30px; border-radius: 10px; border: 1px solid #1f2937; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        select, input { width: 100%; padding: 12px; margin: 12px 0; border: 1px solid #374151; background: #1f2937; color: white; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        select option { background: #111827; color: white; }
        .stops-box { background: #1f2937; border: 1px solid #374151; padding: 15px; border-radius: 6px; text-align: left; max-height: 180px; overflow-y: auto; margin: 15px 0; }
        .stop-row { display: flex; align-items: center; gap: 12px; margin: 10px 0; font-size: 15px; }
        .stop-row input[type="checkbox"] { width: auto; margin: 0; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; color: white; margin-top: 10px; }
        .btn-primary { background: #0055ff; }
        .btn-primary:hover { background: #0044cc; }
        .btn-success { background: #10b981; }
        .btn-success:hover { background: #059669; }
        .hidden { display: none; }
        label { display: block; text-align: left; margin-top: 10px; color: #9ca3af; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-bar">
        <span style="font-weight: bold; font-size: 18px;">🚌 Vignan Driver Control Panel</span>
        <button onclick="logoutUser()" style="background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold;">Logout</button>
    </div>

    <div class="form-wrapper" id="stage1">
        <h2 style="color: #0055ff; margin-top: 0;">Dynamic Route Setup</h2>
        
        <label>Driver ID:</label>
        <input type="number" id="driverid" placeholder="e.g., 105">
        
        <label>Bus Number:</label>
        <input type="number" id="busno" placeholder="e.g., 1">
        
        <label>Source Terminal:</label>
        <select id="sourceSelect" onchange="filterStopsDropdowns()"></select>

        <label>Destination Terminal:</label>
        <select id="destSelect" onchange="filterStopsDropdowns()"></select>

        <button class="btn btn-primary" onclick="goToStage2()">Next: Configure Intermediate Stops ➡️</button>
    </div>

    <div class="form-wrapper hidden" id="stage2">
        <h2 style="color: #10b981; margin-top: 0;">Select Active Route Stops</h2>
        <p style="color: #9ca3af; font-size:13px;">Check the intermediate stop locations this bus will pick up students from during this trip:</p>
        
        <div class="stops-box" id="middleStopsArea"></div>

        <button class="btn btn-success" onclick="startBusTracking()">Start Shift & Live Broadcast</button>
        <button class="btn" style="background:#4b5563;" onclick="backToStage1()">⬅️ Modify Terminals</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAgjc3rXgx_JgUBvnTLv6c32HW4UNyu6Cw",
            authDomain: "bus-tracking-system-78e94.firebaseapp.com",
            databaseURL: "https://bus-tracking-system-78e94-default-rtdb.firebaseio.com",
            projectId: "bus-tracking-system-78e94",
            storageBucket: "bus-tracking-system-78e94.appspot.com",
            messagingSenderId: "316084412095",
            appId: "1:316084412095:web:6438bdbf0e7599b5c2f00a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        var watchID = null;
        var allFetchedLocations = [];

        // Fetch location names directly from your automated Firebase index node
        db.ref("locations").once("value", function(snapshot) {
            if (snapshot.exists()) {
                snapshot.forEach(child => {
                    allFetchedLocations.push(child.key);
                });
                populateTerminalDropdowns();
            }
        });

        function populateTerminalDropdowns() {
            const srcSel = document.getElementById("sourceSelect");
            const destSel = document.getElementById("destSelect");
            
            let optionsHtml = `<option value="">-- Select Location --</option>`;
            allFetchedLocations.forEach(place => {
                optionsHtml += `<option value="${place}">${place}</option>`;
            });

            srcSel.innerHTML = optionsHtml;
            destSel.innerHTML = optionsHtml;
        }

        window.filterStopsDropdowns = function() {
            // Placeholder to add dynamic rules preventing matching terminal sources if desired.
        };

        window.goToStage2 = function() {
            const dId = document.getElementById("driverid").value.trim();
            const bNo = document.getElementById("busno").value.trim();
            const src = document.getElementById("sourceSelect").value;
            const dest = document.getElementById("destSelect").value;

            if (!dId || !bNo || !src || !dest) {
                alert("Please fill out Driver ID, Bus Number, Source, and Destination.");
                return;
            }
            if (src === dest) {
                alert("Source and Destination terminals cannot be identical.");
                return;
            }

            // Render all remaining locations as middle checkboxes
            const container = document.getElementById("middleStopsArea");
            container.innerHTML = "";
            
            let middleStops = allFetchedLocations.filter(place => place !== src && place !== dest);

            if(middleStops.length === 0) {
                container.innerHTML = "<p style='color:#ef4444;'>No secondary stop patterns discovered.</p>";
            } else {
                middleStops.forEach(stop => {
                    container.innerHTML += `
                        <div class="stop-row">
                            <input type="checkbox" name="midStop" value="${stop}" id="chk_${stop}">
                            <label for="chk_${stop}" style="margin:0; color:white;">${stop}</label>
                        </div>
                    `;
                });
            }

            document.getElementById("stage1").classList.add("hidden");
            document.getElementById("stage2").classList.remove("hidden");
        };

        window.backToStage2 = function() {
            document.getElementById("stage2").classList.add("hidden");
            document.getElementById("stage1").classList.remove("hidden");
        };

        window.startBusTracking = function() {
            const dId = document.getElementById("driverid").value.trim();
            const bNo = document.getElementById("busno").value.trim();
            const src = document.getElementById("sourceSelect").value;
            const dest = document.getElementById("destSelect").value;

            let finalRouteSequence = [src];
            document.querySelectorAll('input[name="midStop"]:checked').forEach(cb => {
                finalRouteSequence.push(cb.value);
            });
            finalRouteSequence.push(dest);

            db.ref('drivers/' + dId).once('value', function(snapshot) {
                const driverInfo = snapshot.val() || {};

                if (navigator.geolocation) {
                    alert("Shift verified! Transmitting coordinates to Vignan Student map infrastructure.");
                    
                    watchID = navigator.geolocation.watchPosition(function(pos) {
                        db.ref('buses/' + bNo).update({
                            dId: parseInt(dId),
                            phone: driverInfo.phone || "9704989549", // Uses your standard default backup
                            latitude: pos.coords.latitude,
                            longitude: pos.coords.longitude,
                            sourceName: src,
                            destName: dest,
                            todayRouteStops: finalRouteSequence,
                            lastUpdated: new Date().toLocaleTimeString()
                        });
                    }, function(err) { alert("GPS Lock Failed: " + err.message); }, { enableHighAccuracy: true });

                    document.getElementById("stage2").innerHTML = `
                        <h3 style="color:#10b981;">Shift Active & Tracking</h3>
                        <p style="color:#9ca3af;">Bus #${bNo} is broadcasting live positional tracking telemetry parameters. Keep this browser window open.</p>
                    `;
                } else {
                    alert("Your browser does not support geolocation mapping services.");
                }
            });
        };

        window.backToStage1 = function() {
            document.getElementById("stage2").classList.add("hidden");
            document.getElementById("stage1").classList.remove("hidden");
        };

        window.logoutUser = function() {
            if (confirm("Terminate active tracking session?")) {
                if (watchID) navigator.geolocation.clearWatch(watchID);
                window.location.href = "index.html";
            }
        };
    </script>
</body>
</html>
