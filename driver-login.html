<!DOCTYPE html>
<html>

<head>
<title>Driver Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Driver Login</h2>
<div class="header-container">
    <div class="logo-wrapper">
        <img src="https://vignanits.ac.in/wp-content/uploads/2020/07/1595497656733.png" alt="Vignan Logo" class="vignan-logo">
    </div>
    <nav class="navbar">
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <ul class="nav-links" id="navLinks">
            <li><a href="student-login.html">Student Login</a></li>
            <li><a href="student-signup.html">Student Signup</a></li>
            <li><a href="driver-login.html">Driver Login</a></li>
            <li><a href="driver-signup.html">Driver Signup</a></li>
        </ul>
    </nav>
</div>

<script>
    function toggleMenu() {
        document.getElementById("navLinks").classList.toggle("active");
    }
</script>



<div class="form-wrapper">
    <h2>Driver Login</h2>
    <input type="text" id="driverid" placeholder="Driver ID">
    <input type="text" id="busno" placeholder="Bus Number">
    
    <button onclick="startBus()">Start Bus Tracking</button>

    <div class="forgot-link" style="margin-top: 15px;">
        <a href="#" onclick="showForgotMsg()">Forgot Password?</a>
    </div>
</div>

<script>
    function showForgotMsg() {
        alert("Vignan Transport Security Notice:\n\nPlease visit the Admin Office at the Main Block to reset your credentials.");
    }
</script>



<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>


<script>

const firebaseConfig = {
apiKey: "AIzaSyAgjc3rXgx_JgUBvnTLv6c32HW4UNyu6Cw",
authDomain: "bus-tracking-system-78e94.firebaseapp.com",
databaseURL: "https://bus-tracking-system-78e94-default-rtdb.firebaseio.com",
projectId: "bus-tracking-system-78e94"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();


function driverStart(){

var driver = document.getElementById("driverid").value;
var bus = document.getElementById("busno").value;
var phone = document.getElementById("phone").value;


navigator.geolocation.watchPosition(function(position){

var lat = position.coords.latitude;
var lng = position.coords.longitude;


db.ref("buses/"+bus).set({

driverName:driver,
phone:phone,
lat:lat,
lng:lng

});

});

alert("Bus tracking started");

}

</script>

</body>

</html>
