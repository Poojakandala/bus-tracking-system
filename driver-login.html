<!DOCTYPE html>
<html>

<head>
<title>Driver Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Driver Login</h2>

<input type="text" id="driverid" placeholder="Driver ID"><br><br>
<input type="text" id="busno" placeholder="Bus Number"><br><br>

<button onclick="startBus()">Start Bus</button>



<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>


<script>

const firebaseConfig = {
apiKey: "AIzaSyAgjc3rXgx_JgUBvnTLv6c32HW4UNyu6Cw",
authDomain: "bus-tracking-system-78e94.firebaseapp.com",
databaseURL: "https://bus-tracking-system-78e94-default-rtdb.firebaseio.com",
projectId: "bus-tracking-system-78e94"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();


function driverStart(){

var driver = document.getElementById("driverid").value;
var bus = document.getElementById("busno").value;
var phone = document.getElementById("phone").value;


navigator.geolocation.watchPosition(function(position){

var lat = position.coords.latitude;
var lng = position.coords.longitude;


db.ref("buses/"+bus).set({

driverName:driver,
phone:phone,
lat:lat,
lng:lng

});

});

alert("Bus tracking started");

}

</script>

</body>

</html>
