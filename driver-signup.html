<!DOCTYPE html>
<html>
<head>
    <title>Driver Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Driver Signup</h2>
    <div class="form-container">
        <input type="text" id="driverId" placeholder="Create Driver ID (e.g. D01)"><br><br>
        <input type="text" id="name" placeholder="Full Name"><br><br>
        <input type="text" id="phone" placeholder="Phone Number"><br><br>
        
        <button onclick="signupDriver()">Register Driver</button>
        <p><a href="driver-login.html">Already registered? Login here</a></p>
    </div>

    <script type="module" src="driver-signup.js"></script>
</body>
</html>
