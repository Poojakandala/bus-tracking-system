<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VignanITS Student Portal - Live Tracking</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --vignan-dark: #0b1329;
            --vignan-card: #1c2541;
            --vignan-teal: #5bc0be;
            --vignan-orange: #ff6b00;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--vignan-dark); color: #f8fafc; padding: 15px; box-sizing: border-box; }
        
        .header { background: #002244; padding: 15px; text-align: center; border-bottom: 3px solid var(--vignan-orange); border-radius: 8px; margin-bottom: 15px; }
        .header h1 { margin: 0; font-size: 18px; color: white; }
        .student-meta { color: var(--vignan-teal); margin-top: 5px; font-size: 13px; font-weight: 600; }

        .main-layout { display: flex; flex-direction: column; max-width: 1200px; margin: 0 auto; gap: 15px; }
        @media(min-width: 768px) { .main-layout { flex-direction: row; } }
        
        .dashboard-panel { flex: 1; background: var(--vignan-card); border-radius: 12px; padding: 15px; border: 1px solid #3a506b; min-height: 250px; max-height: 500px; overflow-y: auto; box-sizing: border-box; }
        .panel-title { font-size: 15px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #3a506b; padding-bottom: 8px; margin-top: 0; color: #cbd5e1; }
        
        .bus-card { background: #0b1329; border: 1px solid #3a506b; border-radius: 8px; padding: 12px; margin-bottom: 10px; cursor: pointer; transition: transform 0.2s; border-left: 5px solid #64748b; }
        .bus-card:hover { transform: scale(1.01); }
        .bus-card.priority-1 { border-left-color: var(--vignan-orange); background: linear-gradient(to right, #2a1b10, #0b1329); }
        .bus-card.priority-2 { border-left-color: var(--vignan-teal); }
        
        .bus-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 15px; margin-bottom: 6px; }
        .tag-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }
        .tag-p1 { background: var(--vignan-orange); color: white; }
        .tag-p2 { background: var(--vignan-teal); color: #0b1329; }
        
        .metrics-grid { display: flex; gap: 10px; margin-top: 8px; background: #1c2541; padding: 8px; border-radius: 6px; font-size: 12px; }
        .metric-item { flex: 1; text-align: center; }
        .metric-item span { display: block; font-size: 14px; font-weight: bold; color: var(--vignan-teal); }
        .metric-item.p1-text span { color: var(--vignan-orange); }

        .map-wrapper { flex: 1.5; height: 400px; border-radius: 12px; overflow: hidden; border: 1px solid #3a506b; position: relative; background: #000; }
        #map { width: 100%; height: 100%; }
        .no-buses { text-align: center; color: #94a3b8; padding: 30px 10px; font-size: 13px; }
        
        .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 19, 41, 0.9); display: flex; align-items: center; justify-content: center; z-index: 999; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚌 VignanITS Student Portal</h1>
        <div class="student-meta" id="studentTag">Connecting to Vignan database stream...</div>
    </div>

    <div class="main-layout">
        <div class="dashboard-panel">
            <h2 class="panel-title">Buses For Your Stop</h2>
            <div id="busContainerList"><p class="no-buses">Waiting for location sync...</p></div>
        </div>
        <div class="map-wrapper">
            <div id="loadingOverlay" class="loading-overlay">⏳ Synchronizing Geolocation Map Engine...</div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script>
        const studentAssignedStop = "Lakkaram"; 
        document.getElementById("studentTag").innerText = `Target Stop Base: ${studentAssignedStop} | Student Live Access`;

        const firebaseConfig = {
            apiKey: "AIzaSyAgjc3rXgx_JgUBvnTLv6c32HW4UNyu6Cw",
            authDomain: "bus-tracking-system-78e94.firebaseapp.com",
            databaseURL: "https://bus-tracking-system-78e94-default-rtdb.firebaseio.com",
            projectId: "bus-tracking-system-78e94",
            storageBucket: "bus-tracking-system-78e94.appspot.com",
            messagingSenderId: "316084412095",
            appId: "1:316084412095:web:6438bdbf0e7599b5c2f00a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let locationDatabaseCache = {};
        let map = null;
        let activeMapMarkers = {};
        let isMapInitialized = false;

        function calculateHaversineDistance(lat1, lon1, lat2, lon2) {
            if (!lat1 || !lon1 || !lat2 || !lon2) return 0;
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
        }

        // STEP 1: Download locations first to avoid undefined reference crashes
        db.ref("locations").on("value", function(snapshot) {
            if (snapshot.exists()) {
                snapshot.forEach(child => {
                    // Normalize keys by trimming spaces to avoid matching errors
                    locationDatabaseCache[child.key.trim()] = child.val();
                });
                
                if (!isMapInitialized) {
                    initLeafletMap();
                }
            }
        });

        function initLeafletMap() {
            isMapInitialized = true;
            // Use fallback coordinates if Lakkaram hasn't finished geocoding yet
            const defaultStopGeo = locationDatabaseCache[studentAssignedStop] || { latitude: 17.2584, longitude: 78.8741 };
            
            map = L.map('map').setView([defaultStopGeo.latitude, defaultStopGeo.longitude], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; Leaflet' }).addTo(map);
            
            // Mark Student Base Point
            L.marker([defaultStopGeo.latitude, defaultStopGeo.longitude]).addTo(map)
                .bindPopup(`<b>Your Boarding Station: ${studentAssignedStop}</b>`).openPopup();
            
            // Hide the loading blocker screen
            document.getElementById("loadingOverlay").classList.add("hidden");
            document.getElementById("loadingOverlay").style.display = "none";

            // STEP 2: Start listening for live bus locations
            startLiveBusTrackingStream();
        }

        function startLiveBusTrackingStream() {
            db.ref("buses").on("value", function(snapshot) {
                const listContainer = document.getElementById("busContainerList");
                listContainer.innerHTML = "";
                clearAllMarkers();

                if (!snapshot.exists()) {
                    listContainer.innerHTML = '<p class="no-buses">No buses are actively driving right now.</p>';
                    return;
                }

                let filteredBusesList = [];
                // Dynamic safety fallback verification
                const studentStopGeo = locationDatabaseCache[studentAssignedStop] || { latitude: 17.2584, longitude: 78.8741 };

                snapshot.forEach(child => {
                    const busNo = child.key;
                    const busData = child.val();
                    const routeArray = busData.todayRouteStops || [];

                    if (!busData.latitude || !busData.longitude || !routeArray.includes(studentAssignedStop)) {
                        return; // Ignore buses not on this route
                    }

                    // Compute which stop index the bus is closest to right now
                    let closestStopIndex = 0;
                    let minimumDistanceFound = Infinity;

                    routeArray.forEach((stopName, index) => {
                        const stopCoords = locationDatabaseCache[stopName.trim()];
                        if (stopCoords) {
                            let d = calculateHaversineDistance(busData.latitude, busData.longitude, stopCoords.latitude, stopCoords.longitude);
                            if (d < minimumDistanceFound) {
                                minimumDistanceFound = d;
                                closestStopIndex = index;
                            }
                        }
                    });

                    let studentStopIndex = routeArray.indexOf(studentAssignedStop);

                    // PASSED FILTER: If the bus passed your stop index, hide it instantly
                    if (closestStopIndex > studentStopIndex) {
                        return; 
                    }

                    let distanceKM = calculateHaversineDistance(busData.latitude, busData.longitude, studentStopGeo.latitude, studentStopGeo.longitude);
                    let etaMinutes = Math.round(distanceKM * 2); // Approximate speed metric
                    let etaText = etaMinutes < 1 ? "Arriving Now" : `${etaMinutes} mins`;

                    let priorityLevel = 2; // Route passing priority
                    if (busData.sourceName === studentAssignedStop || busData.destName === studentAssignedStop) {
                        priorityLevel = 1; // Direct match priority
                    }

                    filteredBusesList.push({
                        busNo, data: busData, priorityLevel, distance: distanceKM.toFixed(2) + " km", eta: etaText
                    });
                });

                // Sort lists: Priority 1 explicitly displayed on top
                filteredBusesList.sort((a, b) => a.priorityLevel - b.priorityLevel);

                if (filteredBusesList.length === 0) {
                    listContainer.innerHTML = '<p class="no-buses">No upcoming buses heading towards your stop.</p>';
                    return;
                }

                filteredBusesList.forEach(item => {
                    renderBusUiCard(item);
                    renderBusMapMarker(item.busNo, item.data);
                });
            });
        }

        function renderBusUiCard(item) {
            const container = document.getElementById("busContainerList");
            let priorityClass = item.priorityLevel === 1 ? "priority-1" : "priority-2";
            let badgeText = item.priorityLevel === 1 ? "★ Direct Stop Bus" : "✔ Route Passing";
            let badgeClass = item.priorityLevel === 1 ? "tag-p1" : "tag-p2";

            const card = document.createElement("div");
            card.className = `bus-card ${priorityClass}`;
            card.innerHTML = `
                <div class="bus-header">
                    <span>Bus #${item.busNo}</span>
                    <span class="tag-badge ${badgeClass}">${badgeText}</span>
                </div>
                <div style="font-size: 12px; color: #94a3b8;">
                    <strong>Route:</strong> ${item.data.sourceName} ➔ ${item.data.destName}
                </div>
                <div class="metrics-grid">
                    <div class="metric-item ${item.priorityLevel === 1 ? 'p1-text' : ''}">
                        <span>${item.distance}</span> Distance
                    </div>
                    <div class="metric-item ${item.priorityLevel === 1 ? 'p1-text' : ''}">
                        <span>${item.eta}</span> Time to Reach
                    </div>
                </div>
            `;

            card.onclick = function() {
                if (activeMapMarkers[item.busNo]) {
                    map.setView(activeMapMarkers[item.busNo].getLatLng(), 15);
                    activeMapMarkers[item.busNo].openPopup();
                }
            };
            container.appendChild(card);
        }

        function renderBusMapMarker(busNo, data) {
            const latLng = [data.latitude, data.longitude];
            const marker = L.marker(latLng).addTo(map)
                .bindPopup(`<b>Bus #${busNo}</b><br>Destination: ${data.destName}<br>Last Active: ${data.lastUpdated || 'Just Now'}`);
            activeMapMarkers[busNo] = marker;
        }

        function clearAllMarkers() {
            for (let id in activeMapMarkers) {
                map.removeLayer(activeMapMarkers[id]);
            }
            activeMapMarkers = {};
        }
    </script>
</body>
</html>
