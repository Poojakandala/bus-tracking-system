<!DOCTYPE html>
<html>

<head>

<title>Bus Tracking Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map{
height:500px;
width:90%;
margin:auto;
}
</style>

</head>

<body>

<h2 align="center">College Bus Tracking</h2>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// create map
var map = L.map('map').setView([17.4435,78.441], 13);

// load map tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

// bus marker
var busMarker = L.marker([17.4435,78.441]).addTo(map)
.bindPopup("College Bus");

</script>

</body>
</html>
