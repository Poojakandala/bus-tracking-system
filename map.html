<!DOCTYPE html>
<html>
<head>
    <title>Bus Tracking Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { margin: 0; font-family: sans-serif; }
        #map { height: 500px; width: 95%; margin: 20px auto; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
        .bus-icon { font-size: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header-bar { background: #003366; padding: 12px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-bar">
        <span style="font-size: 1.2rem; font-weight: bold;">🚌 Vignan Bus Tracker</span>
        <button class="logout-btn" onclick="logoutUser()">Logout</button>
    </div>

    <h2 align="center">Live College Bus Locations</h2>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyAgjc3rXgx_JgUBvnTLv6c32HW4UNyu6Cw",
        authDomain: "bus-tracking-system-78e94.firebaseapp.com",
        databaseURL: "https://bus-tracking-system-78e94-default-rtdb.firebaseio.com",
        projectId: "bus-tracking-system-78e94",
        storageBucket: "bus-tracking-system-78e94.appspot.com",
        messagingSenderId: "316084412095",
        appId: "1:316084412095:web:6438bdbf0e7599b5c2f00a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Initialize Map
    var map = L.map('map').setView([17.4435, 78.441], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

    // Custom Bus Emoji Icon
    var busIcon = L.divIcon({ 
        html: '<div style="font-size: 30px;">🚌</div>', 
        iconSize: [30, 30], 
        className: "bus-icon" 
    });

    var markers = {}; // Store multiple bus markers

    // Listen to the entire 'buses' node to find IDs 1, 2, 3
    db.ref("buses").on("value", function(snapshot) {
        const busesData = snapshot.val();
        if (!busesData) return;

        for (let id in busesData) {
            const bus = busesData[id];
            
            // Fix: Ensure coordinates are numbers
            let bLat = parseFloat(bus.latitude);
            let bLng = parseFloat(bus.longitude);

            if (!isNaN(bLat) && !isNaN(bLng)) {
                if (markers[id]) {
                    // Update existing marker position
                    markers[id].setLatLng([bLat, bLng]);
                } else {
                    // Create new bus emoji marker
                    markers[id] = L.marker([bLat, bLng], { icon: busIcon }).addTo(map);
                    
                    // Auto-focus on the bus location
                    map.flyTo([bLat, bLng], 15);
                }

                // Popup with driver details when clicked
                markers[id].bindPopup(`
                    <div style="text-align:center;">
                        <b>Bus Number: ${id}</b><br>
                        Driver ID: ${bus.dId || 'N/A'}<br>
                        <a href="tel:${bus.phone}" style="display:block; background:#28a745; color:white; padding:8px; margin-top:5px; text-decoration:none; border-radius:5px;">📞 Call Driver</a>
                    </div>
                `);
            }
        }
    });

    // Logout Function
    window.logoutUser = function() {
        if (confirm("Are you sure you want to logout?")) {
            window.location.href = "index.html";
        }
    };
</script>
</body>
</html>
