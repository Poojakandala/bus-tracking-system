<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-container">
    <div class="logo-wrapper">
        <img src="https://vignanits.ac.in/wp-content/uploads/2020/07/1595497656733.png" alt="Vignan Logo" class="vignan-logo">
    </div>
    <nav class="navbar">
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <ul class="nav-links" id="navLinks">
            <li><a href="student-login.html">Student Login</a></li>
            <li><a href="student-signup.html">Student Signup</a></li>
            <li><a href="driver-login.html">Driver Login</a></li>
            <li><a href="driver-signup.html">Driver Signup</a></li>
        </ul>
    </nav>
</div>

<script>
    function toggleMenu() {
        document.getElementById("navLinks").classList.toggle("active");
    }
</script>
    
<div class="form-wrapper">
    <h2>Student Login</h2>
    <input type="text" id="roll" placeholder="Roll Number">
    <input type="password" id="password" placeholder="Password">
    
    <button onclick="studentLogin()">Login</button>

    <div class="forgot-link" style="margin-top: 15px;">
        <a href="#" onclick="showForgotMsg()">Forgot Password?</a>
    </div>

    <p style="margin-top: 20px;">
        <a href="student-signup.html">New student? Register here</a>
    </p>
</div>

<script>
    function showForgotMsg() {
        alert("Vignan Transport Security Notice:\n\nPlease visit the Admin Office at the Main Block to reset your credentials.");
    }
</script>
    <script type="module" src="student-login.js"></script>
</body>
</html>
