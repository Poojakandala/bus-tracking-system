<!DOCTYPE html>
<html>
<head>
    <title>Vignan Bus Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        /* Modernized Styles */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #f9f9f9; }
        h2 { background: #003366; color: white; margin: 0; padding: 15px; }
        #map { height: calc(100vh - 70px); width: 100%; } /* Fills the screen */
    </style>
</head>
<body>
   <h2>Vignan College Bus Tracking</h2>
    <div style="background: #003366; padding: 10px; display: flex; justify-content: space-between; align-items: center; color: white;">
        <span style="font-weight: bold;">Vignan Tracker</span>
        <button onclick="logoutUser()" style="background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">
            Logout
        </button>
    </div>


    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script type="module" src="map.js"></script>
</body>
</html>
